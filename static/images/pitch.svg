<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 840" preserveAspectRatio="xMidYMid slice">

  <!-- Base green -->
  <rect width="560" height="840" fill="#4a9e45"/>

  <!-- Alternating darker vertical stripes -->
  <rect x="0"   y="0" width="80" height="840" fill="#357a30"/>
  <rect x="160" y="0" width="80" height="840" fill="#357a30"/>
  <rect x="320" y="0" width="80" height="840" fill="#357a30"/>
  <rect x="480" y="0" width="80" height="840" fill="#357a30"/>

  <!-- Pitch markings -->
  <g stroke="white" stroke-width="3.5" fill="none" stroke-linecap="square">

    <!-- Outer boundary -->
    <rect x="20" y="20" width="520" height="800"/>

    <!-- Halfway line -->
    <line x1="20" y1="420" x2="540" y2="420"/>

    <!-- Centre circle -->
    <circle cx="280" cy="420" r="85"/>

    <!-- Centre spot -->
    <circle cx="280" cy="420" r="5" fill="white" stroke="none"/>

    <!-- ── TOP HALF ── -->

    <!-- Penalty area -->
    <rect x="125" y="20" width="310" height="170"/>

    <!-- 6-yard box -->
    <rect x="195" y="20" width="170" height="68"/>

    <!-- Goal (extends above pitch line) -->
    <line x1="225" y1="20" x2="225" y2="8"/>
    <line x1="335" y1="20" x2="335" y2="8"/>
    <line x1="225" y1="8"  x2="335" y2="8"/>

    <!-- Penalty spot -->
    <circle cx="280" cy="140" r="5" fill="white" stroke="none"/>

    <!-- Penalty arc (D) — bulges toward midfield
         Centre (280,140) r=85, intersects y=190 at x≈211.3 and 348.7 -->
    <path d="M 211.3,190 A 85,85 0 0,0 348.7,190"/>

    <!-- Corner arcs (top) -->
    <path d="M 20,44  A 24,24 0 0,1 44,20"/>
    <path d="M 516,20 A 24,24 0 0,1 540,44"/>

    <!-- ── BOTTOM HALF ── -->

    <!-- Penalty area -->
    <rect x="125" y="650" width="310" height="170"/>

    <!-- 6-yard box -->
    <rect x="195" y="752" width="170" height="68"/>

    <!-- Goal (extends below pitch line) -->
    <line x1="225" y1="820" x2="225" y2="832"/>
    <line x1="335" y1="820" x2="335" y2="832"/>
    <line x1="225" y1="832" x2="335" y2="832"/>

    <!-- Penalty spot -->
    <circle cx="280" cy="700" r="5" fill="white" stroke="none"/>

    <!-- Penalty arc (D) — bulges toward midfield
         Centre (280,700) r=85, intersects y=650 at x≈211.3 and 348.7 -->
    <path d="M 211.3,650 A 85,85 0 0,1 348.7,650"/>

    <!-- Corner arcs (bottom) -->
    <path d="M 20,796  A 24,24 0 0,0 44,820"/>
    <path d="M 516,820 A 24,24 0 0,0 540,796"/>

  </g>
</svg>
