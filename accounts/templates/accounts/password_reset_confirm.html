{% extends "base.html" %}

{% block title %}Set New Password – Football Trumps{% endblock %}

{% block content %}
<div class="card">
    <h1>New Password</h1>

    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <p>
                {{ field.label_tag }}
                {{ field }}
                {{ field.errors }}
            </p>
        {% endfor %}
        <button type="submit">Update password</button>
    </form>
</div>
{% endblock %}
