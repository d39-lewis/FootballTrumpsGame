{% extends "base.html" %}

{% block title %}Register – Football Trumps{% endblock %}

{% block content %}
<div class="card">
    <h1>Create Account</h1>

    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <p>
                {{ field.label_tag }}
                {{ field }}
                {{ field.errors }}
            </p>
        {% endfor %}
        <button type="submit">Register</button>
    </form>

    <div class="card-links">
        <p>Already have an account? <a href="{% url 'accounts:login' %}">Log in</a></p>
    </div>
</div>
{% endblock %}
