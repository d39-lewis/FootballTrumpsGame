{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home – Football Trumps</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-image: url("{% static 'images/pitch.svg' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* ── Panel ── */
        .game-panel {
            width: 82%;
            max-width: 1000px;
        }

        /* ── Nav ── */
        .game-nav {
            display: flex;
            border-radius: 12px 12px 0 0;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-bottom: none;
        }

        .game-nav a {
            flex: 1;
            text-align: center;
            padding: 1rem 0.5rem;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            color: #fff;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            border-right: 1px solid rgba(255, 255, 255, 0.15);
            transition: background 0.15s;
            line-height: 1.3;
        }

        .game-nav a:last-child { border-right: none; }

        .game-nav a.active {
            background: rgba(0, 0, 0, 0.82);
        }

        .game-nav a:hover:not(.active) {
            background: rgba(0, 0, 0, 0.68);
        }

        /* ── Panel body ── */
        .panel-body {
            background: rgba(0, 0, 0, 0.72);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 0 0 12px 12px;
            display: flex;
            align-items: center;
            min-height: 420px;
            padding: 2.5rem 2rem;
        }

        /* ── Play area (left 2/3) ── */
        .play-area {
            flex: 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn {
            display: inline-block;
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
        }

        .play-btn:hover { transform: scale(1.06); }

        /* ── Stats (right 1/3) ── */
        .stats-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2.2rem;
            align-items: center;
            text-align: center;
            padding-left: 1rem;
        }

        .stat-label {
            font-size: 1.15rem;
            font-weight: 700;
            color: #d4edda;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin-top: 0.2rem;
        }
    </style>
</head>
<body>
    <div class="game-panel">

        <!-- Navigation -->
        <nav class="game-nav">
            <a href="{% url 'home' %}" class="active">Home</a>
            <a href="{% url 'how_to_play' %}">How to<br>play</a>
            <a href="{% url 'store:store' %}">Packs</a>
            <a href="{% url 'cards:collection' %}">Cards</a>
            <a href="{% url 'accounts:settings' %}">Settings</a>
            <form method="post" action="{% url 'accounts:logout' %}" style="flex:1;margin:0;">
                {% csrf_token %}
                <button type="submit" style="
                    width:100%;height:100%;padding:1rem 0.5rem;
                    background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);
                    border:none;border-left:1px solid rgba(255,255,255,0.15);
                    color:rgba(255,255,255,0.7);font-size:1rem;font-weight:500;
                    cursor:pointer;transition:background 0.15s;line-height:1.3;
                " onmouseover="this.style.background='rgba(0,0,0,0.68)'"
                   onmouseout="this.style.background='rgba(0,0,0,0.55)'">
                    Log out
                </button>
            </form>
        </nav>

        <!-- Main panel -->
        <div class="panel-body">

            <!-- Football "Play" button -->
            <div class="play-area">
                <a href="#" class="play-btn">
                    <svg viewBox="0 0 200 200" width="175" height="175" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <clipPath id="bc"><circle cx="100" cy="100" r="87"/></clipPath>
                        </defs>

                        <!-- Ball base -->
                        <circle cx="100" cy="100" r="87" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>

                        <!-- Black patches — standard football pattern -->
                        <!-- Centre pentagon (pointing up) -->
                        <polygon points="100,58 140,87 125,134 75,134 60,87"
                                 fill="#1a1a1a" clip-path="url(#bc)"/>
                        <!-- Top -->
                        <polygon points="78,30 100,13 122,30 100,58"
                                 fill="#1a1a1a" clip-path="url(#bc)"/>
                        <!-- Top-right -->
                        <polygon points="152,60 162,36 182,66 175,82 148,90"
                                 fill="#1a1a1a" clip-path="url(#bc)"/>
                        <!-- Bottom-right -->
                        <polygon points="148,144 172,136 182,166 160,182 132,172"
                                 fill="#1a1a1a" clip-path="url(#bc)"/>
                        <!-- Bottom -->
                        <polygon points="75,156 100,172 125,156 125,134 75,134"
                                 fill="#1a1a1a" clip-path="url(#bc)"/>
                        <!-- Bottom-left -->
                        <polygon points="52,144 68,172 40,182 18,166 28,136"
                                 fill="#1a1a1a" clip-path="url(#bc)"/>
                        <!-- Top-left -->
                        <polygon points="48,60 38,36 18,66 25,82 52,90"
                                 fill="#1a1a1a" clip-path="url(#bc)"/>

                        <!-- "Play" label -->
                        <text x="100" y="116"
                              text-anchor="middle"
                              font-family="Georgia, 'Times New Roman', serif"
                              font-size="38" font-weight="bold" font-style="italic"
                              paint-order="stroke"
                              stroke="white" stroke-width="5"
                              fill="#1a1a1a">Play</text>
                    </svg>
                </a>
            </div>

            <!-- Stats -->
            <div class="stats-area">
                <div>
                    <p class="stat-label">Wins / losses</p>
                    <p class="stat-value">{{ wins }}/{{ losses }}</p>
                </div>
                <div>
                    <p class="stat-label">Points accumulated</p>
                    <p class="stat-value">{{ points }}</p>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
